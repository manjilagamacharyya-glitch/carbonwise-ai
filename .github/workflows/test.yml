name: CarbonWise AI - Automated Tests

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4

      with:
        node-version: 20

    - name: Run Calculator Tests
      run: node tests/calculator.test.js

    - name: Run Persona Tests
      run: node tests/persona.test.js

    - name: Run Simulator Tests
      run: node tests/simulator.test.js

    - name: Run AI Engine Tests
      run: node tests/ai-engine.test.js

    - name: Run Community Tests
      run: node tests/community.test.js

    - name: Run All Tests
      run: node tests/run-all-tests.js