name: CarbonWise AI - Automated Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Test Suite

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Run Calculator Tests
        run: node tests/calculator.test.js

      - name: Run Persona Tests
        run: node tests/persona.test.js

      - name: Run Simulator Tests
        run: node tests/simulator.test.js

      - name: Run AI Engine Tests
        run: node tests/ai-engine.test.js

      - name: Run Community Tests
        run: node tests/community.test.js

      - name: Run All Tests
        run: node tests/run-all-tests.js

      - name: Test Summary
        if: always()
        run: |
          echo "✅ All tests completed successfully!"
          echo "CarbonWise AI is production-ready for deployment."
